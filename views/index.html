<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eetirp - Corporate Portal Access</title>
  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2 family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-main: #f8fafc;
      --bg-card: rgba(255, 255, 255, 0.85);
      --border-color: #e2e8f0;
      --border-focus: #2563eb;
      --text-main: #0f172a;
      --text-muted: #475569;
      --purple-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      --purple-gradient-hover: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow decorations */
    .bg-decorations {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 50%;
      height: 50%;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.05);
      filter: blur(120px);
    }
    .bg-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 50%;
      height: 50%;
      border-radius: 50%;
      background: rgba(13, 148, 136, 0.05);
      filter: blur(120px);
    }

    /* Login Container */
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* Header Branding */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .brand-logo {
      height: 48px;
      border-radius: 8px;
      object-fit: contain;
    }
    .brand-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }
    .brand-tagline {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Forms */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .form-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 14px 12px 42px;
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .form-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      background: white;
    }

    /* Error / Warning Alert Banner */
    .alert-banner {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .alert-banner.error {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #dc2626;
    }
    .alert-banner.warning {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #b45309;
    }
    .alert-banner i {
      flex-shrink: 0;
    }

    /* Submit Button */
    .btn-submit {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      border-radius: 12px;
      background: var(--purple-gradient);
      color: white;
      font-weight: 600;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
      margin-top: 8px;
    }
    .btn-submit:hover {
      background: var(--purple-gradient-hover);
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25);
    }
    .btn-submit:active {
      transform: scale(0.98);
    }
    .btn-submit:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
      color: #64748b;
    }

    /* Footer links */
    .card-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .card-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .card-link:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND DECORATIONS -->
  <div class="bg-decorations">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
  </div>

  <!-- LOGIN PANEL -->
  <div class="login-container">
    <div class="login-card">
      
      <!-- Brand Logo header -->
      <div class="brand-header">
        <img src="/logo.jpg" alt="Eetirp Logo" class="brand-logo">
        <h1 class="brand-name">Eetirp</h1>
        <p class="brand-tagline">Innovate. Integrate. Elevate.</p>
      </div>

      <!-- Alert banners -->
      <div class="alert-banner" id="alertBox">
        <span id="alertIconContainer" style="display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <i data-lucide="alert-circle" style="height: 18px; width: 18px;"></i>
        </span>
        <span id="alertMsg">Error message</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="identifier">Username or Email</label>
          <div class="input-wrapper">
            <i class="input-icon" data-lucide="user" style="height: 18px; width: 18px;"></i>
            <input class="form-input" type="text" id="identifier" placeholder="Enter email or username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <i class="input-icon" data-lucide="lock" style="height: 18px; width: 18px;"></i>
            <input class="form-input" type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>
        </div>

        <button class="btn-submit" type="submit" id="submitBtn">
          <span>Sign In</span>
          <i data-lucide="arrow-right" style="height: 18px; width: 18px;"></i>
        </button>
      </form>

      <!-- Footer sign up redirect -->
      <div class="card-footer">
        Don't have an account? 
        <a class="card-link" href="/register">Create Account</a>
      </div>

    </div>
  </div>

  <script>
    // Initialize icons
    lucide.createIcons();

    const loginForm = document.getElementById('loginForm');
    const identifierInput = document.getElementById('identifier');
    const passwordInput = document.getElementById('password');
    const alertBox = document.getElementById('alertBox');
    const alertMsg = document.getElementById('alertMsg');
    const submitBtn = document.getElementById('submitBtn');

    // Check system connection status on load
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/status');
        if (response.ok) {
          const data = await response.json();
          if (!data.isMongoActive) {
            showAlert("Database connection is currently offline. Local fallback authentication is active.", "warning");
          }
        }
      } catch (err) {
        console.error("Connection check failed:", err);
      }
    });

    function showAlert(msg, type = "error") {
      alertMsg.textContent = msg;
      alertBox.className = `alert-banner ${type}`;
      alertBox.style.display = 'flex';
      
      const iconName = type === "warning" ? 'alert-triangle' : 'alert-circle';
      const iconContainer = document.getElementById('alertIconContainer');
      if (iconContainer) {
        iconContainer.innerHTML = `<i data-lucide="${iconName}" style="height: 18px; width: 18px;"></i>`;
        lucide.createIcons();
      }
    }

    function hideAlert() {
      alertBox.style.display = 'none';
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const identifier = identifierInput.value.trim();
      const password = passwordInput.value;

      if (!identifier || !password) {
        showAlert("All fields are required.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.querySelector('span').textContent = "Authenticating...";

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ identifier, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Success redirection to console dashboard
          window.location.href = '/';
        } else {
          showAlert(data.error?.message || "Authentication failed. Try again.");
          submitBtn.disabled = false;
          submitBtn.querySelector('span').textContent = "Sign In";
        }
      } catch (err) {
        console.error("Login request failed:", err);
        showAlert("Failed to connect to authentication server. Please check your network.");
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
